name: Build Prynt APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Flutter pub get
        run: flutter pub get

      - name: Generate missing Android files
        run: |
          flutter create \
            --org com.prynt \
            --project-name prynt_app \
            --platforms android \
            . 2>&1 || true

      - name: Generate app icons from logo
        run: |
          pip install Pillow --quiet
          python3 << 'PYEOF'
          from PIL import Image
          import os

          candidates = [
              "assets/logo.png",
              "assets/logo.jpg",
              "assets/logo.jpeg",
          ]

          src = None
          for c in candidates:
              if os.path.exists(c):
                  src = c
                  print(f"Found logo at: {c}")
                  break

          if not src:
              print("No logo found in assets/ — skipping icon generation")
              print("Files in current dir:", os.listdir("."))
              if os.path.exists("assets"):
                  print("Files in assets/:", os.listdir("assets"))
              exit(0)

          img = Image.open(src).convert("RGBA")
          print(f"Logo size: {img.size}")

          sizes = {
              "android/app/src/main/res/mipmap-mdpi/ic_launcher.png": 48,
              "android/app/src/main/res/mipmap-hdpi/ic_launcher.png": 72,
              "android/app/src/main/res/mipmap-xhdpi/ic_launcher.png": 96,
              "android/app/src/main/res/mipmap-xxhdpi/ic_launcher.png": 144,
              "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png": 192,
          }

          for path, size in sizes.items():
              os.makedirs(os.path.dirname(path), exist_ok=True)
              resized = img.resize((size, size), Image.LANCZOS)
              bg = Image.new("RGBA", (size, size), (255, 255, 255, 255))
              bg.paste(resized, (0, 0), resized)
              bg.convert("RGB").save(path, "PNG")
              print(f"Generated {path} ({size}x{size})")

          print("All icons generated successfully")
          PYEOF

      - name: Create firebase_options.dart placeholder
        run: |
          if [ ! -f lib/firebase_options.dart ]; then
            cat > lib/firebase_options.dart << 'EOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart'
              show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              if (kIsWeb) throw UnsupportedError('Web not configured.');
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return android;
                default:
                  throw UnsupportedError('Platform not configured.');
              }
            }

            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'placeholder-api-key',
              appId: '1:000000000000:android:0000000000000000',
              messagingSenderId: '000000000000',
              projectId: 'placeholder-project',
              storageBucket: 'placeholder-project.appspot.com',
            );
          }
          EOF
          fi

      - name: Build APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL || 'http://10.0.2.2:8000' }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: prynt-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
