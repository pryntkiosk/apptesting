name: prynt_app
description: Prynt - Admin & Delivery Partner app for self-service printing kiosks.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.2.2

  # Secure token storage
  flutter_secure_storage: ^9.2.2

  # Firebase / Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Maps + navigation
  google_maps_flutter: ^2.9.0
  url_launcher: ^6.3.1
  geolocator: ^13.0.1

  # Utils
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
